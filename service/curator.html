<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>일잇다 — 큐레이터 검토 대시보드</title>
  <link rel="stylesheet" href="service.css" />
</head>
<body>
  <header class="svc-header">
    <div class="svc-header-inner">
      <a href="../index.html" class="svc-brand">
        <span class="logo-mark">잇</span>
        <span><strong>일잇다</strong><small>큐레이터</small></span>
      </a>
      <span class="svc-role-pill" style="background:rgba(15,23,42,0.08); color:#0f172a;">큐레이터 화면</span>
    </div>
  </header>

  <main class="svc-main">
    <div class="svc-title">
      <h1>매칭 검토 대시보드</h1>
      <p>AI 추천 결과를 검토하고 승인·보류·반려합니다. AI는 보조 도구이며 최종 판단은 큐레이터가 합니다.</p>
    </div>

    <div class="curator-layout">
      <aside class="curator-side">
        <h3>검토 상태</h3>
        <button class="side-tab active" data-tab="pending">
          <span>검토 대기</span>
          <span class="badge" id="cnt-pending">0</span>
        </button>
        <button class="side-tab" data-tab="hold">
          <span>보류</span>
          <span class="badge" id="cnt-hold">0</span>
        </button>
        <button class="side-tab" data-tab="approved">
          <span>승인 완료</span>
          <span class="badge" id="cnt-approved">0</span>
        </button>
        <button class="side-tab" data-tab="rejected">
          <span>반려</span>
          <span class="badge" id="cnt-rejected">0</span>
        </button>

        <h3 style="margin-top:24px;">데이터</h3>
        <button class="side-tab" id="seedBtn" style="background:#f1f5f9;">
          <span>샘플 데이터 채우기</span>
        </button>
        <button class="side-tab" id="resetBtn" style="background:#fee2e2; color:#dc2626;">
          <span>전체 초기화</span>
        </button>
      </aside>

      <section>
        <div class="match-list" id="matchList"></div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="curator.js"></script>
</body>
</html>
